name: Convert CSV to YML

on:
  push:
    paths:
      - "products.csv"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 允許 Actions 修改 repo
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install pandas

      - name: Run conversion script
        run: python convert.py

      - name: Debug check files
        run: |
          echo "=== 檔案清單 ==="
          ls -l
          echo "=== products.yml 內容 ==="
          cat products.yml || echo "products.yml 沒有生成"

      - name: Commit YML
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add products.yml || echo "沒有找到 products.yml"
          git commit -m "Auto-convert CSV to YML" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
